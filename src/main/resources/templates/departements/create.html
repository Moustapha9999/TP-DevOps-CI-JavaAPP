<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajouter un Département</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <style>
    body {
      background-color: #f8f9fa;
    }

    .form-card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      padding: 30px;
      transition: transform 0.3s ease-in-out;
    }

    .form-card:hover {
      transform: translateY(-5px);
    }

    .form-header {
      background: linear-gradient(135deg, #007bff, #28a745);
      color: white;
      padding: 20px;
      border-radius: 15px 15px 0 0;
      text-align: center;
    }

    .btn-custom {
      background: linear-gradient(135deg, #36fac2 0%, #0cb2e4 100%);
      border: none;
      padding: 10px 25px;
      font-weight: 500;
    }

    .btn-custom:hover {
      background: linear-gradient(135deg, #f31919 0%, #6a11cb 100%);
    }

    .fade-in {
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
<div class="container py-5 fade-in">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="form-card">
        <div class="form-header">
          <h2><i class="bi bi-building-add me-2"></i>Créer un nouveau Département</h2>
        </div>
        <form th:action="@{/departements/save}" th:object="${departement}" method="post" class="mt-4">
          <div class="mb-3">
            <label for="codedep" class="form-label">Code du département</label>
            <input type="text" class="form-control" id="codedep" th:field="*{codedep}" placeholder="Ex : INF01" required />
          </div>
          <div class="mb-3">
            <label for="nomdep" class="form-label">Nom du département</label>
            <input type="text" class="form-control" id="nomdep" th:field="*{nomdep}" placeholder="Ex : Informatique" required />
          </div>
          <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-custom text-white">
              <i class="bi bi-save"></i> Enregistrer
            </button>
            <a href="/departements" class="btn btn-outline-secondary">
              <i class="bi bi-x-circle me-1"></i> Annuler
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Gestion des Départements</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    .card-header-custom {
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      color: white;
      padding: 20px;
    }

    .btn-ajouter {
      background: #ffffff;
      color: #2575fc;
      font-weight: 500;
      border: 1px solid #ffffff;
      transition: 0.3s ease-in-out;
    }

    .btn-ajouter:hover {
      background: #f1f1f1;
      color: #1a5be2;
    }

    .badge-count {
      font-size: 1rem;
      background-color: #6c757d;
    }
  </style>
</head>
<body class="bg-light">
<div class="container py-4">
  <div class="card border-0 shadow">
    <div class="card-header card-header-custom">
      <h2 class="mb-3"><i class="bi bi-building me-2"></i>Gestion des Départements</h2>
      <a th:href="@{/departements/new}" class="btn btn-ajouter">
        <i class="bi bi-plus-circle"></i> Ajouter
      </a>
    </div>

    <div class="card-body">
      <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
          <tr>
            <th>Code</th>
            <th>Nom</th>
            <th>Enseignants</th>
            <th class="text-end">Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="dep : ${departements}">
            <td th:text="${dep.codedep}"></td>
            <td th:text="${dep.nomdep}"></td>
            <td>
              <span class="badge badge-count" th:text="${dep.enseignants != null ? dep.enseignants.size() : 0}"></span>
            </td>
            <td class="text-end">
              <a th:href="@{/departements/edit/{code}(code=${dep.codedep})}" class="btn btn-sm btn-warning me-2">
                <i class="bi bi-pencil"></i> Modifier
              </a>
              <a th:href="@{/departements/delete/{code}(code=${dep.codedep})}" class="btn btn-sm btn-danger"
                 onclick="return confirm('Confirmer la suppression ?')">
                <i class="bi bi-trash"></i> Supprimer
              </a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card-footer bg-transparent d-flex justify-content-end">
      <a th:href="@{/}" class="btn btn-outline-primary">
        <i class="bi bi-arrow-left"></i> Retour à l'accueil
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

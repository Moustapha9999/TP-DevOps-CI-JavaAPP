<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ajouter un Enseignant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    .card-header-custom {
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      color: white;
    }
  </style>
</head>
<body class="bg-light">
<div class="container py-4">
  <div class="card border-0 shadow">
    <div class="card-header card-header-custom py-3">
      <h2 class="mb-0"><i class="bi bi-person-plus"></i> Ajouter un nouveau Enseignant</h2>
    </div>

    <div class="card-body">
      <form th:action="@{/enseignants/save}" method="post">
        <div class="mb-3">
          <label for="nom" class="form-label">Nom</label>
          <input type="text" id="nom" name="nom" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="prenom" class="form-label">Prénom</label>
          <input type="text" id="prenom" name="prenom" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="grade" class="form-label">Grade</label>
          <input type="text" id="grade" name="grade" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="departementCode" class="form-label">Département</label>
          <select id="departementCode" name="departementCode" class="form-select" required>
            <option value="">-- Sélectionnez un département --</option>
            <option th:each="dep : ${departements}" th:value="${dep.codedep}" th:text="${dep.nomdep}"></option>
          </select>
        </div>

        <div class="d-flex justify-content-end">
          <button type="submit" class="btn btn-success me-2">
            <i class="bi bi-save"></i> Enregistrer
          </button>
          <a th:href="@{/enseignants}" class="btn btn-secondary">
            <i class="bi bi-x-circle"></i> Annuler
          </a>
        </div>
      </form>
    </div>

    <div class="card-footer bg-transparent">
      <a th:href="@{/}" class="btn btn-outline-primary">
        <i class="bi bi-arrow-left"></i> Retour à l'accueil
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

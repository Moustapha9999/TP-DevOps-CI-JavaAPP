<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Liste des Enseignants</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .card-header-custom {
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      color: white;
    }
  </style>
</head>
<body class="bg-light">

<div class="container py-4">
  <div class="card border-0 shadow">
    <div class="card-header card-header-custom py-3">
      <h2 class="mb-0"><i class="bi bi-people-fill"></i> Liste des Enseignants</h2>
    </div>

    <div class="card-body">
      <a th:href="@{/enseignants/new}" class="btn btn-primary mb-3">
        <i class="bi bi-plus-circle"></i> Ajouter un enseignant
      </a>

      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-primary">
          <tr>
            <th>Matricule</th>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Grade</th>
            <th>Département</th>
            <th>Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="ens : ${enseignants}">
            <td th:text="${ens.matr}"></td>
            <td th:text="${ens.nom}"></td>
            <td th:text="${ens.prenom}"></td>
            <td th:text="${ens.grade}"></td>
            <td th:text="${ens.departement?.nomdep ?: 'Non affecté'}"></td>
            <td>
              <div class="d-flex gap-2">
                <a th:href="@{/enseignants/edit/{matr}(matr=${ens.matr})}" class="btn btn-warning btn-sm">
                  <i class="bi bi-pencil-square"></i> Modifier
                </a>
                <a th:href="@{/enseignants/delete/{matr}(matr=${ens.matr})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Supprimer cet enseignant ?')">
                  <i class="bi bi-trash"></i> Supprimer
                </a>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card-footer bg-transparent text-end">
      <a th:href="@{/}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Retour à l'accueil
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
